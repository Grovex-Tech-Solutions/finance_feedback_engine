services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ffe-backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_HOST=http://127.0.0.1:11434
    command: uvicorn finance_feedback_engine.api.app:app --host 0.0.0.0 --port 8000
    volumes:
      - ffe-data:/app/data
      - ffe-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: ffe-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: ffe_user
      POSTGRES_PASSWORD: ffe_pass
      POSTGRES_DB: ffe
    volumes:
      - ffe-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffe_user -d ffe"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  ffe-data:
    driver: local
  ffe-logs:
    driver: local
  ffe-db:
    driver: local
